<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="16" fill="#DEFF0A"/>
  <!-- Pattern di punti neri -->
  <!-- Punti centrali verticali (3 grandi) -->
  <circle cx="32" cy="24" r="4" fill="#1A1A1A"/>
  <circle cx="32" cy="32" r="4" fill="#1A1A1A"/>
  <circle cx="32" cy="40" r="4" fill="#1A1A1A"/>
  
  <!-- Punti diagonali medi (4) -->
  <circle cx="20" cy="20" r="3" fill="#1A1A1A"/>
  <circle cx="44" cy="20" r="3" fill="#1A1A1A"/>
  <circle cx="20" cy="44" r="3" fill="#1A1A1A"/>
  <circle cx="44" cy="44" r="3" fill="#1A1A1A"/>
  
  <!-- Punti cardinali (4 piccoli) -->
  <circle cx="32" cy="12" r="2" fill="#1A1A1A"/>
  <circle cx="32" cy="52" r="2" fill="#1A1A1A"/>
  <circle cx="12" cy="32" r="2" fill="#1A1A1A"/>
  <circle cx="52" cy="32" r="2" fill="#1A1A1A"/>
  
  <!-- Punti intercardinali (4 piccoli) -->
  <circle cx="16" cy="16" r="1.5" fill="#1A1A1A"/>
  <circle cx="48" cy="16" r="1.5" fill="#1A1A1A"/>
  <circle cx="16" cy="48" r="1.5" fill="#1A1A1A"/>
  <circle cx="48" cy="48" r="1.5" fill="#1A1A1A"/>
  
  <!-- Punti aggiuntivi per raggiungere 17 -->
  <circle cx="24" cy="28" r="2" fill="#1A1A1A"/>
  <circle cx="40" cy="28" r="2" fill="#1A1A1A"/>
  <circle cx="24" cy="36" r="2" fill="#1A1A1A"/>
  <circle cx="40" cy="36" r="2" fill="#1A1A1A"/>
</svg>
